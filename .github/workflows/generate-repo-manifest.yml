name: Generate Repo Reality Manifest

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/repo/**'

permissions:
  contents: write

jobs:
  generate-repo-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate repo manifest
        run: node scripts/generate-repo-manifest.mjs

      - name: Stage manifest files
        run: git add docs/repo

      - name: Commit manifest if changed
        run: |
          if git diff --cached --quiet; then
            echo "No manifest changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: refresh repo reality manifest"
          git push